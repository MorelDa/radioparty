<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radio Party Valencia | Oficial</title>

    <meta property="og:title" content="Radio Party Valencia | Oficial">
    <meta property="og:description" content="Conectando con el mejor ritmo.">
    <meta property="og:image" content="https://i.postimg.cc/mgT4Qfzd/N.png">
    <meta property="og:url" content="https://morelda.github.io/radioparty/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://i.postimg.cc/mgT4Qfzd/N.png">

    <link rel="icon" type="image/png" href="https://i.postimg.cc/mgT4Qfzd/N.png">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/mgT4Qfzd/N.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        :root { --pink: #ff2d55; --bg: #ffffff; --text: #1a1a1a; --card: #f8f8f8; --border: rgba(0,0,0,0.08); }
        body.dark-mode { --bg: #0d0d0d; --text: #ffffff; --card: #1a1a1a; --border: rgba(255,255,255,0.1); }
        
        body { background: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* SLIDER SUPERIOR - Efecto Ken Burns y degradado */
        .hero { 
            width: 100%; height: 65vh; position: relative; overflow: hidden;
            mask-image: linear-gradient(to bottom, black 80%, transparent 100%); 
            -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%); 
        }
        .hero img { width: 100%; height: 100%; object-fit: cover; object-position: top; }

        .header-main { position: relative; margin-top: -120px; padding: 0 6%; display: flex; align-items: center; justify-content: center; gap: 20px; z-index: 100; }
        .heart-box { width: 150px; height: 150px; border-radius: 2.8rem; border: 6px solid white; box-shadow: 0 20px 45px rgba(0,0,0,0.15); overflow: hidden; background: white; flex-shrink: 0; }
        
        @media (min-width: 1024px) { 
            .hero { height: 80vh; } 
            .header-main { margin-top: -240px; gap: 60px; } 
            .heart-box { width: 420px; height: 420px; border-radius: 5.5rem; border: 15px solid white; } 
        }

        .block-title { font-size: 26px; font-weight: 900; text-transform: uppercase; margin-bottom: 35px; text-align: center; }
        .block-title::after { content: ''; display: block; width: 60px; height: 5px; background: var(--pink); margin: 10px auto 0; border-radius: 10px; }

        .card { background: var(--card); border-radius: 2.2rem; padding: 15px; border: 1px solid var(--border); }
        .card img { border-radius: 1.8rem; width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        
        .player-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; padding: 18px 30px; z-index: 5000; display: flex; align-items: center; justify-content: space-between; border-top: 5px solid var(--pink); color: white; }
    </style>
</head>
<body>

    <button class="mode-toggle" id="mode-btn" style="position:fixed; top:20px; right:20px; z-index:6000; background:var(--pink); color:white; width:45px; height:45px; border-radius:50%; border:none;"><i class="fas fa-moon"></i></button>
    <audio id="main-stream" crossorigin="anonymous"></audio>

    <div class="hero">
        <div class="swiper main-swiper h-full w-full">
            <div class="swiper-wrapper" id="slider-target"></div>
        </div>
    </div>

    <header class="header-main">
        <div class="flex-1">
            <h1 class="nexa text-[42px] md:text-[90px] font-black">RADIO<br><span class="text-[#ff2d55]">PARTY.</span></h1>
        </div>
        <div class="heart-box">
            <img id="radio-art-big" src="https://i.postimg.cc/7hgdMS6K/Picsart-24-08-01-00-13-45-109.png" class="w-full h-full object-cover">
        </div>
    </header>

    <main id="web-content" class="pt-16 px-6 max-w-7xl mx-auto w-full"></main>
    
    <footer class="text-center py-20 pb-40 text-[10px] font-bold opacity-60 uppercase">© 2026 DJKEVIN PRODUCCIONES</footer>

    <div class="player-bar">
        <div class="flex items-center gap-4">
            <img id="radio-art-small" src="https://i.postimg.cc/7hgdMS6K/Picsart-24-08-01-00-13-45-109.png" class="w-14 h-14 rounded-2xl object-cover">
            <div>
                <p id="radio-title" class="font-bold text-[11px] uppercase truncate w-36">Conectando...</p>
                <span class="text-pink-500 text-[9px] font-black uppercase">En Directo</span>
            </div>
        </div>
        <button id="play-btn" class="bg-[#ff2d55] w-14 h-14 rounded-full text-white flex items-center justify-center">
            <i class="fas fa-play" id="play-icon"></i>
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const audio = document.getElementById('main-stream');
        const playBtn = document.getElementById('play-btn');
        const playIcon = document.getElementById('play-icon');
        const streamUrl = "https://miestacion.turadioonline.com.ar/8286/stream";

        playBtn.onclick = () => {
            if (audio.paused) { 
                audio.src = streamUrl + "?t=" + Date.now(); 
                audio.play(); playIcon.className = 'fas fa-pause'; 
            } else { 
                audio.pause(); audio.src = ""; playIcon.className = 'fas fa-play'; 
            }
        };

        document.getElementById('mode-btn').onclick = () => {
            document.body.classList.toggle('dark-mode');
            document.getElementById('mode-btn').innerHTML = document.body.classList.contains('dark-mode') ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        };

        async function loadData() {
            try {
                const res = await fetch('datos.json?v=' + Math.random());
                const data = await res.json();

                document.getElementById('slider-target').innerHTML = data.slider_principal.map(img => `<div class="swiper-slide"><img src="${img}"></div>`).join('');
                new Swiper('.main-swiper', { loop: true, effect: 'fade', autoplay: { delay: 5000 }, speed: 1500 });

                let html = '';
                // 1. Rankings / Novedades
                data.secciones.forEach((sec, index) => {
                    html += `<div class="mt-20">
                        <h2 class="block-title">${sec.nombre} <span class="text-[#ff2d55]">${sec.sub}</span></h2>
                        <div class="swiper s-${index} !overflow-visible">
                            <div class="swiper-wrapper">
                                ${sec.items.map(i => `<div class="swiper-slide" style="width:260px"><div class="card"><a href="${i.url}" target="_blank"><img src="${i.img}"><p class="mt-4 text-center text-[12px] font-black uppercase truncate">${i.titulo}</p></a></div></div>`).join('')}
                            </div>
                        </div>
                    </div>`;
                });

                // 2. TV (POR ORDEN)
                if (data.url_tv) {
                    html += `<div class="mt-20"><h2 class="block-title">TV EN <span class="text-[#ff2d55]">VIVO</span></h2><div class="card overflow-hidden bg-black !p-0 aspect-video shadow-2xl"><video id="tv-player" class="w-full h-full" controls playsinline poster="https://i.postimg.cc/mgT4Qfzd/N.png"></video></div></div>`;
                }

                // 3. Redes
                html += `<div class="mt-24 text-center"><h2 class="block-title">Redes <span class="text-[#ff2d55]">Sociales</span></h2><div class="flex flex-wrap justify-center gap-6 mt-8"><a href="${data.redes.instagram}" target="_blank" class="bg-black text-white px-8 py-4 rounded-full font-bold uppercase text-xs"><i class="fab fa-instagram"></i> Instagram</a><a href="${data.redes.whatsapp}" target="_blank" class="bg-[#25D366] text-white px-8 py-4 rounded-full font-bold uppercase text-xs"><i class="fab fa-whatsapp"></i> WhatsApp</a></div></div>`;

                document.getElementById('web-content').innerHTML = html;

                if (data.url_tv) {
                    const video = document.getElementById('tv-player');
                    if (Hls.isSupported()) {
                        const hls = new Hls(); hls.loadSource(data.url_tv); hls.attachMedia(video);
                    } else if (video.canPlayType('application/vnd.apple.mpegurl')) { video.src = data.url_tv; }
                }

                // --- CONFIGURACIÓN DE INERCIA TOTAL PARA MÓVIL ---
                data.secciones.forEach((_, idx) => {
                    new Swiper(`.s-${idx}`, { 
                        slidesPerView: 'auto', 
                        spaceBetween: 25, 
                        freeMode: {
                            enabled: true,
                            momentum: true, // Esto activa la inercia
                            momentumRatio: 3, // Cuanto más alto, más distancia recorre al soltar
                            momentumVelocityRatio: 2, // Cuanto más alto, más rápido rueda
                            momentumBounce: false,
                        },
                        mousewheel: true,
                        touchAngle: 45,
                        grabCursor: true,
                        shortSwipes: false // Evita que se detenga de golpe
                    });
                });

            } catch (err) { console.error(err); }
        }

        async function updateMeta() {
            try {
                const r = await fetch('https://miestacion.turadioonline.com.ar/cp/get_info.php?p=8286');
                const d = await r.json();
                if(d.title) document.getElementById('radio-title').innerText = d.title;
                if(d.art) { document.getElementById('radio-art-small').src = d.art; document.getElementById('radio-art-big').src = d.art; }
            } catch (e) {}
        }

        window.onload = () => { loadData(); updateMeta(); setInterval(updateMeta, 15000); };
    </script>
</body>
</html>
