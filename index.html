<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radio Party Valencia | En Vivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        :root { --pink: #ff2d55; --bg: #ffffff; --text: #1a1a1a; --card: #f9f9f9; }
        body.dark-mode { --bg: #0a0a0a; --text: #ffffff; --card: #181818; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; transition: 0.5s; overflow-x: hidden; }
        
        .nexa-heavy { line-height: 0.8; letter-spacing: -2px; text-transform: uppercase; font-weight: 900; }
        
        /* Efecto Slider Superior */
        .hero-container { width: 100%; height: 60vh; position: relative; mask-image: linear-gradient(to bottom, black 70%, transparent 100%); -webkit-mask-image: linear-gradient(to bottom, black 70%, transparent 100%); }
        .hero-container img { width: 100%; height: 100%; object-fit: cover; }

        /* Cabecera Flotante */
        .header-main { position: relative; margin-top: -100px; padding: 0 20px; display: flex; align-items: center; justify-content: center; gap: 15px; z-index: 100; }
        .heart-box { width: 140px; height: 140px; border-radius: 2.5rem; border: 6px solid white; box-shadow: 0 15px 40px rgba(255,45,85,0.4); overflow: hidden; animation: pulse 2s infinite; background: white; flex-shrink: 0; }
        
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @media (min-width: 768px) { .header-main { margin-top: -180px; } .heart-box { width: 380px; height: 380px; border-radius: 5rem; border: 12px solid white; } }

        /* Estilo de Tarjetas */
        .card { background: var(--card); border-radius: 2rem; padding: 12px; transition: 0.4s; display: block; border: 1px solid rgba(255,45,85,0.1); }
        .card img { border-radius: 1.5rem; width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        
        /* Reproductor Inferior */
        .player-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; padding: 15px 25px; z-index: 2000; display: flex; align-items: center; justify-content: space-between; border-top: 4px solid var(--pink); box-shadow: 0 -10px 30px rgba(0,0,0,0.5); }
        
        .btn-mode { position: fixed; top: 20px; right: 20px; z-index: 3000; width: 45px; height: 45px; border-radius: 50%; background: var(--pink); color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; box-shadow: 0 4px 15px rgba(255,45,85,0.5); }
    </style>
</head>
<body class="dark-mode">

    <button class="btn-mode" id="btn-mode"><i class="fas fa-sun"></i></button>

    <div class="hero-container">
        <div class="swiper main-slider h-full w-full">
            <div class="swiper-wrapper" id="slider-target">
                <div class="swiper-slide"><img src="https://img.freepik.com/foto-gratis/vista-frontal-mujer-escuchando-musica_23-2148597018.jpg"></div>
            </div>
        </div>
    </div>

    <header class="header-main">
        <div class="flex-1"><h1 class="nexa-heavy text-[38px] md:text-[100px]">RADIO<br><span class="text-[#ff2d55]">PARTY.</span></h1></div>
        <div class="heart-box"><img id="radio-art-big" src="https://i.postimg.cc/7hgdMS6K/Picsart-24-08-01-00-13-45-109.png" class="w-full h-full object-cover"></div>
    </header>

    <main id="web-sections" class="pb-40 pt-10">
        </main>

    <div class="player-bar">
        <div class="flex items-center gap-4">
            <img id="radio-art-small" src="https://i.postimg.cc/7hgdMS6K/Picsart-24-08-01-00-13-45-109.png" class="w-14 h-14 rounded-xl object-cover border-2 border-white/20">
            <div class="text-white">
                <p id="radio-title" class="font-black text-xs uppercase truncate w-32">Radio Party Valencia</p>
                <div class="flex items-center gap-2">
                    <span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-pink-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-pink-500"></span></span>
                    <span class="text-pink-500 text-[10px] font-black uppercase">En Directo</span>
                </div>
            </div>
        </div>
        <button id="play-action" class="bg-[#ff2d55] w-14 h-14 rounded-full text-white text-2xl flex items-center justify-center shadow-lg active:scale-90 transition">
            <i class="fas fa-play" id="icon-play"></i>
        </button>
    </div>

    <audio id="player-stream" src="https://miestacion.turadioonline.com.ar/8286/stream" crossorigin="anonymous"></audio>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const audio = document.getElementById('player-stream');
        const playBtn = document.getElementById('play-action');
        const playIcon = document.getElementById('icon-play');

        // Función de Play
        playBtn.onclick = () => {
            if (audio.paused) { audio.play(); playIcon.className = 'fas fa-pause'; }
            else { audio.pause(); playIcon.className = 'fas fa-play'; }
        };

        // Dark/Light Mode
        document.getElementById('btn-mode').onclick = () => {
            document.body.classList.toggle('dark-mode');
            document.getElementById('btn-mode').innerHTML = document.body.classList.contains('dark-mode') ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        };

        // CARGA DESDE DATA.JSON (PANEL)
        async function initWeb() {
            try {
                const response = await fetch('data.json?v=' + Date.now());
                const data = await response.json();

                // 1. Configurar Slider Superior
                const sliderWrapper = document.getElementById('slider-target');
                const images = data.slider_principal.filter(url => url.length > 5);
                
                if (images.length > 0) {
                    sliderWrapper.innerHTML = images.map(img => `<div class="swiper-slide"><img src="${img}"></div>`).join('');
                    // Iniciar movimiento del slider
                    new Swiper('.main-slider', {
                        loop: true,
                        effect: 'fade',
                        autoplay: { delay: 4000, disableOnInteraction: false },
                        speed: 1000
                    });
                }

                let contentHtml = '';

                // 2. Pintar Secciones (Ranking, Novedades, etc)
                data.secciones.forEach(sec => {
                    if (sec.items && sec.items.length > 0) {
                        contentHtml += `
                        <div class="mt-12">
                            <h2 class="text-center nexa-heavy text-2xl mb-6">${sec.nombre} <span class="text-[#ff2d55]">${sec.sub}</span></h2>
                            <div class="swiper item-slider px-6">
                                <div class="swiper-wrapper">
                                    ${sec.items.map(item => `
                                        <div class="swiper-slide" style="width:230px">
                                            <a href="${item.url || '#'}" target="_blank" class="card shadow-xl">
                                                <img src="${item.img || 'https://via.placeholder.com/400'}">
                                                <p class="mt-4 text-center text-[10px] font-black uppercase tracking-tighter">${item.titulo || 'RADIO PARTY'}</p>
                                            </a>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>`;
                    }
                });

                // 3. Redes Sociales
                contentHtml += `<div class="flex justify-center gap-4 mt-16 px-6">
                    ${data.redes.instagram ? `<a href="${data.redes.instagram}" target="_blank" class="bg-black text-white px-6 py-3 rounded-full text-[10px] font-black border border-white/20">INSTAGRAM</a>` : ''}
                    ${data.redes.whatsapp ? `<a href="${data.redes.whatsapp}" target="_blank" class="bg-[#25D366] text-white px-6 py-3 rounded-full text-[10px] font-black">WHATSAPP</a>` : ''}
                </div>`;

                // 4. Video YouTube
                if (data.youtube_url && data.youtube_url.includes('http')) {
                    contentHtml += `<div class="mt-16 px-6 max-w-4xl mx-auto">
                        <div class="aspect-video rounded-[3rem] overflow-hidden border-8 border-white shadow-2xl">
                            <iframe class="w-full h-full" src="${data.youtube_url}" frameborder="0" allowfullscreen></iframe>
                        </div>
                    </div>`;
                }

                document.getElementById('web-sections').innerHTML = contentHtml;
                
                // Iniciar sliders de las secciones (movimiento horizontal con el dedo)
                new Swiper('.item-slider', { slidesPerView: 'auto', spaceBetween: 20, freeMode: true });

            } catch (e) {
                console.log("Esperando configuración del panel...");
            }
        }

        // Actualizar Canción y Carátula
        async function syncRadio() {
            try {
                const r = await fetch('https://miestacion.turadioonline.com.ar/cp/get_info.php?p=8286');
                const d = await r.json();
                if(d.title) document.getElementById('radio-title').innerText = d.title;
                if(d.art) {
                    document.getElementById('radio-art-small').src = d.art;
                    document.getElementById('radio-art-big').src = d.art;
                }
            } catch (e) {}
        }

        window.onload = () => { initWeb(); syncRadio(); setInterval(syncRadio, 12000); };
    </script>
</body>
</html>
