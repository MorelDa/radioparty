<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radio Party Valencia | Full Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        :root { --pink: #ff2d55; --bg: #0a0a0a; }
        body { background: var(--bg); color: white; font-family: 'Montserrat', sans-serif; margin: 0; overflow-x: hidden; }
        .nexa { text-transform: uppercase; font-weight: 900; letter-spacing: -2px; line-height: 0.8; }
        
        /* SLIDER: Recorte hacia abajo y difuminado largo */
        .hero { 
            width: 100%; 
            height: 75vh; /* Más alto en PC */
            position: relative; 
            mask-image: linear-gradient(to bottom, black 60%, transparent 100%); 
            -webkit-mask-image: linear-gradient(to bottom, black 60%, transparent 100%); 
        }
        .hero img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            object-position: top; /* Muestra desde arriba y recorta abajo */
        }

        /* CABECERA: Adaptativa PC/Móvil */
        .header-main { 
            position: relative; 
            margin-top: -150px; 
            padding: 0 5%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 20px; 
            z-index: 100; 
        }
        .heart-box { 
            width: 160px; height: 160px; 
            border-radius: 2.5rem; 
            border: 8px solid white; 
            box-shadow: 0 25px 50px rgba(255,45,85,0.4); 
            overflow: hidden; 
            animation: pulse 2s infinite; 
            background: white; 
            flex-shrink: 0; 
        }
        
        /* Ajustes para PC (Pantallas grandes) */
        @media (min-width: 1024px) {
            .hero { height: 85vh; }
            .header-main { margin-top: -280px; gap: 60px; }
            .nexa { font-size: 130px !important; } /* Título gigante en PC */
            .heart-box { width: 450px; height: 450px; border-radius: 6rem; border: 15px solid white; }
        }

        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }

        /* Tarjetas */
        .card { background: #151515; border-radius: 2.5rem; padding: 15px; transition: 0.3s ease; border: 1px solid rgba(255,255,255,0.05); }
        .card:hover { transform: translateY(-10px); border-color: var(--pink); }
        .card img { border-radius: 1.8rem; width: 100%; aspect-ratio: 1/1; object-fit: cover; }

        /* Player */
        .player-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); padding: 15px 30px; z-index: 2000; display: flex; align-items: center; justify-content: space-between; border-top: 4px solid var(--pink); }
    </style>
</head>
<body>

    <audio id="audio-player" preload="none" crossorigin="anonymous">
        <source src="https://miestacion.turadioonline.com.ar/8286/stream" type="audio/mpeg">
    </audio>

    <div class="hero">
        <div class="swiper main-swiper h-full w-full">
            <div class="swiper-wrapper" id="slider-target">
                <div class="swiper-slide"><img src="https://img.freepik.com/foto-gratis/vista-frontal-mujer-escuchando-musica_23-2148597018.jpg"></div>
            </div>
        </div>
    </div>

    <header class="header-main">
        <div class="flex-1">
            <h1 class="nexa text-[45px]">RADIO<br><span class="text-[#ff2d55]">PARTY.</span></h1>
        </div>
        <div class="heart-box">
            <img id="radio-art-big" src="https://i.postimg.cc/7hgdMS6K/Picsart-24-08-01-00-13-45-109.png" class="w-full h-full object-cover">
        </div>
    </header>

    <main id="web-content" class="pb-40 pt-20">
        </main>

    <div class="player-bar">
        <div class="flex items-center gap-4">
            <img id="radio-art-small" src="https://i.postimg.cc/7hgdMS6K/Picsart-24-08-01-00-13-45-109.png" class="w-14 h-14 rounded-2xl object-cover border-2 border-white/10">
            <div class="text-white overflow-hidden">
                <p id="radio-title" class="font-black text-xs uppercase truncate w-40 md:w-64">Cargando Radio...</p>
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-pink-500 rounded-full animate-ping"></span>
                    <span id="status-tag" class="text-pink-500 text-[10px] font-black italic uppercase">En Directo</span>
                </div>
            </div>
        </div>
        <button id="play-btn" class="bg-[#ff2d55] w-16 h-16 rounded-full text-white text-3xl flex items-center justify-center shadow-lg hover:scale-105 transition">
            <i class="fas fa-play" id="play-icon"></i>
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const audio = document.getElementById('audio-player');
        const playBtn = document.getElementById('play-btn');
        const playIcon = document.getElementById('play-icon');
        const statusTag = document.getElementById('status-tag');

        playBtn.onclick = () => {
            if (audio.paused) {
                statusTag.innerText = "CONECTANDO...";
                audio.load();
                audio.play().then(() => {
                    playIcon.className = 'fas fa-pause';
                    statusTag.innerText = "EN DIRECTO";
                });
            } else {
                audio.pause();
                playIcon.className = 'fas fa-play';
                statusTag.innerText = "PAUSADO";
            }
        };

        async function loadData() {
            try {
                const res = await fetch('datos.json?v=' + Math.random());
                const data = await res.json();

                // Slider
                const images = data.slider_principal.filter(url => url.length > 5);
                if (images.length > 0) {
                    document.getElementById('slider-target').innerHTML = images.map(img => `<div class="swiper-slide"><img src="${img}"></div>`).join('');
                    new Swiper('.main-swiper', { loop: true, effect: 'fade', autoplay: { delay: 5000 }, speed: 1500 });
                }

                let html = '';
                data.secciones.forEach(sec => {
                    if (sec.items && sec.items.length > 0) {
                        html += `
                        <div class="mt-20">
                            <h2 class="text-center nexa text-3xl md:text-5xl mb-10">${sec.nombre} <span class="text-[#ff2d55]">${sec.sub}</span></h2>
                            <div class="swiper sec-slider px-10">
                                <div class="swiper-wrapper">
                                    ${sec.items.map(item => `
                                        <div class="swiper-slide" style="width:260px">
                                            <a href="${item.url}" target="_blank" class="card shadow-2xl">
                                                <img src="${item.img}">
                                                <p class="mt-4 text-center text-xs font-black uppercase tracking-widest truncate">${item.titulo}</p>
                                            </a>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>`;
                    }
                });

                // Redes
                html += `<div class="flex justify-center gap-6 mt-24 px-6">
                    <a href="${data.redes.instagram}" target="_blank" class="bg-white text-black px-10 py-4 rounded-full text-xs font-black uppercase hover:bg-pink-500 hover:text-white transition">Instagram</a>
                    <a href="${data.redes.whatsapp}" target="_blank" class="bg-[#25D366] text-white px-10 py-4 rounded-full text-xs font-black uppercase hover:scale-105 transition">WhatsApp</a>
                </div>`;

                document.getElementById('web-content').innerHTML = html;
                new Swiper('.sec-slider', { slidesPerView: 'auto', spaceBetween: 30 });

            } catch (err) { console.log("Revisa datos.json"); }
        }

        async function updateMeta() {
            try {
                const r = await fetch('https://miestacion.turadioonline.com.ar/cp/get_info.php?p=8286');
                const d = await r.json();
                if(d.title) document.getElementById('radio-title').innerText = d.title;
                if(d.art) {
                    document.getElementById('radio-art-small').src = d.art;
                    document.getElementById('radio-art-big').src = d.art;
                }
            } catch (e) {}
        }

        window.onload = () => { loadData(); updateMeta(); setInterval(updateMeta, 15000); };
    </script>
</body>
</html>
