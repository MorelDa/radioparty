<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radio Party Valencia | En Vivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Montserrat', sans-serif; margin: 0; overflow-x: hidden; }
        .nexa { text-transform: uppercase; font-weight: 900; letter-spacing: -2px; line-height: 0.8; }
        .hero { width: 100%; height: 50vh; mask-image: linear-gradient(to bottom, black 70%, transparent 100%); }
        .hero img { width: 100%; height: 100%; object-fit: cover; }
        .header-main { position: relative; margin-top: -100px; padding: 0 20px; display: flex; align-items: center; justify-content: center; gap: 15px; z-index: 100; }
        .heart-box { width: 140px; height: 140px; border-radius: 2.5rem; border: 6px solid white; box-shadow: 0 15px 40px rgba(255,45,85,0.4); overflow: hidden; animation: pulse 2s infinite; background: white; flex-shrink: 0; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .player-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; padding: 15px 25px; z-index: 2000; display: flex; align-items: center; justify-content: space-between; border-top: 4px solid #ff2d55; }
        .card { background: #181818; border-radius: 2rem; padding: 12px; display: block; text-decoration: none; color: inherit; }
        .card img { border-radius: 1.5rem; width: 100%; aspect-ratio: 1/1; object-fit: cover; }
    </style>
</head>
<body>

    <audio id="audio-player" preload="none" crossorigin="anonymous">
        <source src="https://miestacion.turadioonline.com.ar/8286/stream" type="audio/mpeg">
    </audio>

    <div class="hero">
        <div class="swiper main-swiper h-full w-full">
            <div class="swiper-wrapper" id="slider-target">
                <div class="swiper-slide"><img src="https://img.freepik.com/foto-gratis/vista-frontal-mujer-escuchando-musica_23-2148597018.jpg"></div>
            </div>
        </div>
    </div>

    <header class="header-main">
        <div class="flex-1"><h1 class="nexa text-[38px] md:text-[90px]">RADIO<br><span class="text-[#ff2d55]">PARTY.</span></h1></div>
        <div class="heart-box"><img id="radio-art-big" src="https://i.postimg.cc/7hgdMS6K/Picsart-24-08-01-00-13-45-109.png" class="w-full h-full object-cover"></div>
    </header>

    <main id="web-content" class="pb-40 pt-10">
        </main>

    <div class="player-bar">
        <div class="flex items-center gap-4">
            <img id="radio-art-small" src="https://i.postimg.cc/7hgdMS6K/Picsart-24-08-01-00-13-45-109.png" class="w-12 h-12 rounded-xl object-cover">
            <div class="text-white overflow-hidden">
                <p id="radio-title" class="font-black text-[10px] uppercase truncate w-32">Radio Party Valencia</p>
                <span id="status-tag" class="text-[#ff2d55] text-[9px] font-black italic">EN DIRECTO</span>
            </div>
        </div>
        <button id="play-btn" class="bg-[#ff2d55] w-14 h-14 rounded-full text-white text-2xl flex items-center justify-center shadow-lg active:scale-90 transition-all">
            <i class="fas fa-play" id="play-icon"></i>
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const audio = document.getElementById('audio-player');
        const playBtn = document.getElementById('play-btn');
        const playIcon = document.getElementById('play-icon');
        const statusTag = document.getElementById('status-tag');

        // LÓGICA DEL REPRODUCTOR
        playBtn.addEventListener('click', function() {
            if (audio.paused) {
                // Forzamos la carga del stream al dar play
                statusTag.innerText = "CONECTANDO...";
                audio.load(); 
                audio.play().then(() => {
                    playIcon.className = 'fas fa-pause';
                    statusTag.innerText = "EN DIRECTO";
                }).catch(err => {
                    console.error("Error de reproducción:", err);
                    statusTag.innerText = "ERROR DE CONEXIÓN";
                });
            } else {
                audio.pause();
                playIcon.className = 'fas fa-play';
                statusTag.innerText = "PAUSADO";
            }
        });

        // CARGAR DATOS DESDE datos.json
        async function loadData() {
            try {
                const res = await fetch('datos.json?v=' + Math.random());
                if (!res.ok) throw new Error();
                const data = await res.json();

                // Slider
                const validSlides = data.slider_principal.filter(url => url.length > 5);
                if (validSlides.length > 0) {
                    document.getElementById('slider-target').innerHTML = validSlides.map(img => `<div class="swiper-slide"><img src="${img}"></div>`).join('');
                    new Swiper('.main-swiper', { loop: true, effect: 'fade', autoplay: { delay: 4000 } });
                }

                let html = '';
                data.secciones.forEach(sec => {
                    if (sec.items && sec.items.length > 0) {
                        html += `
                        <div class="mt-12">
                            <h2 class="text-center nexa text-2xl mb-6">${sec.nombre} <span class="text-[#ff2d55]">${sec.sub}</span></h2>
                            <div class="swiper sec-slider px-6">
                                <div class="swiper-wrapper">
                                    ${sec.items.map(item => `
                                        <div class="swiper-slide" style="width:200px">
                                            <a href="${item.url}" target="_blank" class="card shadow-xl">
                                                <img src="${item.img}">
                                                <p class="mt-3 text-center text-[10px] font-bold uppercase truncate">${item.titulo}</p>
                                            </a>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>`;
                    }
                });

                // Redes
                html += `<div class="flex justify-center gap-4 mt-16 px-6">
                    <a href="${data.redes.instagram}" target="_blank" class="bg-white text-black px-6 py-2 rounded-full text-[10px] font-black uppercase">Instagram</a>
                    <a href="${data.redes.whatsapp}" target="_blank" class="bg-[#25D366] text-white px-6 py-2 rounded-full text-[10px] font-black uppercase">WhatsApp</a>
                </div>`;

                document.getElementById('web-content').innerHTML = html;
                new Swiper('.sec-slider', { slidesPerView: 'auto', spaceBetween: 20 });

            } catch (err) {
                document.getElementById('web-content').innerHTML = `<p class="text-center opacity-30 mt-20 text-xs">REVISA EL ARCHIVO DATOS.JSON</p>`;
            }
        }

        async function updateMeta() {
            try {
                const r = await fetch('https://miestacion.turadioonline.com.ar/cp/get_info.php?p=8286');
                const d = await r.json();
                if(d.title) document.getElementById('radio-title').innerText = d.title;
                if(d.art) {
                    document.getElementById('radio-art-small').src = d.art;
                    document.getElementById('radio-art-big').src = d.art;
                }
            } catch (e) {}
        }

        window.onload = () => { loadData(); updateMeta(); setInterval(updateMeta, 15000); };
    </script>
</body>
</html>
