<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Panel Administrador - Radio Tabocas Mix</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<style>:root{
  --primary:#e91e63;
  --primary-dark:#ad1457;
  --primary-light:#fce4ec;
  --accent:#ff4081;
  --bg:#f8f5f7;
  --surface:#ffffff;
  --text:#1f1235;
  --text-muted:#6b5b73;
  --border:#f0d7e3;
  --success:#10b981;
  --danger:#ef4444;
  --shadow:0 8px 24px rgba(233,30,99,0.10);
  --shadow-sm:0 2px 8px rgba(233,30,99,0.08);
  --radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;display:flex;min-height:100vh}
button{font-family:inherit;cursor:pointer}
a{color:inherit;text-decoration:none}

/* SIDEBAR */
.sidebar{width:280px;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0;transition:transform .3s}
.sidebar-logo{display:flex;align-items:center;gap:12px;padding:20px;border-bottom:1px solid var(--border)}
.sidebar-logo .logo-icon{width:42px;height:42px;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;border-radius:10px;display:grid;place-items:center;font-size:18px;box-shadow:var(--shadow-sm)}
.sb-title{font-family:'Montserrat',sans-serif;font-weight:800;font-size:16px;color:var(--primary-dark)}
.sb-sub{font-size:11px;color:var(--text-muted)}
.sidebar-nav{flex:1;padding:12px 10px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.sb-link{display:flex;align-items:center;gap:12px;padding:11px 14px;background:transparent;border:none;border-radius:8px;text-align:left;font-size:13.5px;font-weight:500;color:var(--text);transition:background .15s,color .15s,padding .15s;width:100%}
.sb-link i{width:18px;color:var(--text-muted);font-size:14px}
.sb-link:hover{background:var(--primary-light);color:var(--primary-dark)}
.sb-link:hover i{color:var(--primary)}
.sb-link.active{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;font-weight:600;box-shadow:var(--shadow-sm)}
.sb-link.active i{color:#fff}
.sidebar-bottom{padding:16px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px}

/* BUTTONS */
.btn-primary,.btn-secondary,.btn-ghost,.btn-danger{padding:10px 16px;border-radius:8px;border:none;font-weight:600;font-size:13px;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:transform .15s,background .15s,opacity .15s}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;box-shadow:var(--shadow-sm)}
.btn-primary:hover{transform:translateY(-1px)}
.btn-secondary{background:var(--primary-light);color:var(--primary-dark)}
.btn-secondary:hover{background:#f8c8da}
.btn-ghost{background:#fff;color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg)}
.btn-danger{background:#fee2e2;color:var(--danger)}
.btn-danger:hover{background:#fecaca}
.btn-sm{padding:6px 10px;font-size:12px;border-radius:6px}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;gap:16px;position:sticky;top:0;z-index:10}
.topbar h1{font-family:'Montserrat',sans-serif;font-size:20px;color:var(--primary-dark);font-weight:800}
.topbar-actions{display:flex;gap:10px}
.mobile-menu-btn{display:none;background:transparent;border:none;font-size:22px;color:var(--primary)}

.content{padding:28px;max-width:100%}

/* CARDS / FORMS */
.card{background:#fff;border-radius:var(--radius);padding:22px;box-shadow:var(--shadow-sm);border:1px solid var(--border);margin-bottom:18px}
.card-title{font-family:'Montserrat',sans-serif;font-weight:700;font-size:15px;color:var(--primary-dark);margin-bottom:16px;display:flex;align-items:center;gap:10px;text-transform:uppercase;letter-spacing:.5px}
.card-title i{color:var(--primary)}

.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group.full{grid-column:1/-1}
.form-label{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}
.form-input,.form-textarea,.form-select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;background:#fff;font-family:inherit;font-size:13.5px;color:var(--text);transition:border-color .15s,box-shadow .15s}
.form-textarea{resize:vertical;min-height:80px;font-family:inherit}
.form-input:focus,.form-textarea:focus,.form-select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(233,30,99,.12)}
.form-input[type="color"]{padding:4px;height:42px;cursor:pointer}

.color-row{display:flex;align-items:center;gap:10px}
.color-row input[type="color"]{width:50px;height:36px;border:1.5px solid var(--border);border-radius:8px;padding:2px;cursor:pointer;flex-shrink:0}
.color-row input[type="text"]{flex:1}

/* LIST ITEMS */
.items-list{display:flex;flex-direction:column;gap:12px}
.item-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px;transition:box-shadow .15s,border-color .15s}
.item-card:hover{border-color:var(--primary-light);box-shadow:var(--shadow-sm)}
.item-header{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
.item-title{font-weight:700;font-size:14px;color:var(--primary-dark);display:flex;align-items:center;gap:8px}
.item-title .item-num{background:var(--primary-light);color:var(--primary-dark);width:24px;height:24px;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:800}
.item-actions{display:flex;gap:6px}
.icon-btn{background:transparent;border:1px solid var(--border);width:30px;height:30px;border-radius:6px;display:grid;place-items:center;color:var(--text-muted);transition:background .15s,color .15s,border-color .15s}
.icon-btn:hover{background:var(--primary-light);color:var(--primary);border-color:var(--primary-light)}
.icon-btn.delete:hover{background:#fee2e2;color:var(--danger);border-color:#fecaca}

.add-btn{padding:12px 16px;border:1.5px dashed var(--primary);background:rgba(233,30,99,.04);color:var(--primary-dark);border-radius:var(--radius);font-weight:600;font-size:13px;display:flex;align-items:center;justify-content:center;gap:8px;width:100%;transition:background .15s}
.add-btn:hover{background:rgba(233,30,99,.08)}

/* IMG PREVIEW */
.img-preview{width:64px;height:64px;border-radius:8px;object-fit:cover;background:var(--bg);border:1px solid var(--border);flex-shrink:0}
.preview-row{display:flex;align-items:center;gap:12px}

/* SCHEDULE TABS */
.day-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;background:var(--bg);padding:6px;border-radius:10px}
.day-tab-admin{padding:8px 14px;border:none;background:transparent;border-radius:6px;font-weight:600;font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;transition:background .15s,color .15s}
.day-tab-admin:hover{color:var(--primary-dark)}
.day-tab-admin.active{background:#fff;color:var(--primary-dark);box-shadow:var(--shadow-sm)}

/* JSON VIEW */
.json-view{background:#1e1e1e;color:#f8f8f2;padding:20px;border-radius:var(--radius);font-family:'Courier New',monospace;font-size:12px;overflow-x:auto;white-space:pre-wrap;max-height:70vh;line-height:1.5}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;padding:14px 20px;border-radius:8px;box-shadow:0 10px 30px rgba(0,0,0,.2);font-size:13px;font-weight:500;opacity:0;transform:translateY(10px);transition:opacity .25s,transform .25s;z-index:100;pointer-events:none;display:flex;align-items:center;gap:10px}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{background:var(--success)}
.toast.error{background:var(--danger)}

/* INFO BOX */
.info-box{background:linear-gradient(135deg,#fff5f9,#fff);border-left:4px solid var(--primary);padding:14px 16px;border-radius:8px;font-size:13px;color:var(--text);margin-bottom:18px;display:flex;gap:10px;align-items:flex-start}
.info-box i{color:var(--primary);margin-top:2px;font-size:16px}

/* RESPONSIVE */
@media (max-width:980px){
  .sidebar{position:fixed;left:0;top:0;transform:translateX(-100%);z-index:50;box-shadow:8px 0 24px rgba(0,0,0,.1)}
  .sidebar.open{transform:translateX(0)}
  .mobile-menu-btn{display:block}
  .content{padding:18px}
  .topbar{padding:14px 18px}
  .topbar h1{font-size:16px}
  .btn-ghost{display:none}
}
</style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon"><i class="fas fa-broadcast-tower"></i></div>
      <div>
        <div class="sb-title">Tabocas Mix</div>
        <div class="sb-sub">Panel Admin</div>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav">
      <button class="sb-link active" data-tab="site"><i class="fas fa-globe"></i> Información del Sitio</button>
      <button class="sb-link" data-tab="theme"><i class="fas fa-palette"></i> Colores y Tema</button>
      <button class="sb-link" data-tab="menu"><i class="fas fa-bars"></i> Menú</button>
      <button class="sb-link" data-tab="player"><i class="fas fa-play-circle"></i> Reproductor / EN VIVO</button>
      <button class="sb-link" data-tab="banners"><i class="fas fa-images"></i> Banners</button>
      <button class="sb-link" data-tab="news"><i class="fas fa-newspaper"></i> Últimas Noticias</button>
      <button class="sb-link" data-tab="featuredNews"><i class="fas fa-star"></i> Noticias Destacadas</button>
      <button class="sb-link" data-tab="topPrograms"><i class="fas fa-trophy"></i> Programas Top</button>
      <button class="sb-link" data-tab="schedule"><i class="fas fa-calendar-week"></i> Programación</button>
      <button class="sb-link" data-tab="podcasts"><i class="fas fa-podcast"></i> Podcasts</button>
      <button class="sb-link" data-tab="videos"><i class="fab fa-youtube"></i> Top Videos</button>
      <button class="sb-link" data-tab="locutores"><i class="fas fa-microphone"></i> Locutores</button>
      <button class="sb-link" data-tab="vote"><i class="fas fa-heart"></i> TaboMix Vote</button>
      <button class="sb-link" data-tab="footer"><i class="fas fa-shoe-prints"></i> Pie de Página</button>
      <button class="sb-link" data-tab="json"><i class="fas fa-code"></i> Vista JSON</button>
    </nav>
    <div class="sidebar-bottom">
      <button class="btn-secondary" id="loadJsonBtn"><i class="fas fa-upload"></i> Cargar JSON</button>
      <input type="file" id="loadJsonInput" accept="application/json" hidden />
      <button class="btn-primary" id="downloadBtn"><i class="fas fa-download"></i> Descargar JSON</button>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fas fa-bars"></i></button>
      <h1 id="pageTitle">Información del Sitio</h1>
      <div class="topbar-actions">
        <a href="index.html" target="_blank" class="btn-ghost"><i class="fas fa-eye"></i> Previsualizar Sitio</a>
        <button class="btn-primary" id="saveBtn"><i class="fas fa-save"></i> Guardar Cambios</button>
      </div>
    </header>

    <div class="content" id="content"></div>
  </main>

  <div class="toast" id="toast"></div>

  <script>// ============================================
// ADMIN.JS - Panel Administrador Visual
// ============================================
let DATA = null;
let currentTab = 'site';
let currentDay = 'lunes';

const DAY_KEYS = ['lunes','martes','miercoles','jueves','viernes','sabado','domingo'];
const DAY_LABELS = {lunes:'Lunes',martes:'Martes',miercoles:'Miércoles',jueves:'Jueves',viernes:'Viernes',sabado:'Sábado',domingo:'Domingo'};

const TAB_TITLES = {
  site:'Información del Sitio',theme:'Colores y Tema',menu:'Menú de Navegación',
  player:'Reproductor / EN VIVO',banners:'Banners Promocionales',news:'Últimas Noticias',
  featuredNews:'Noticias Destacadas',topPrograms:'Programas Más Sintonizados',
  schedule:'Programación Radial',podcasts:'Podcasts',videos:'Top Video Ranking',
  locutores:'Nuestros Locutores',vote:'TaboMix Vote (Votación)',footer:'Pie de Página',json:'Vista JSON'
};

// LOAD INITIAL DATA
async function init(){
  try{
    const res = await fetch('data.json?v='+Date.now());
    DATA = await res.json();
  }catch(e){
    DATA = getDefaultData();
    toast('No se pudo cargar data.json. Usando estructura por defecto.', 'error');
  }
  // Try load from localStorage if newer changes exist
  const saved = localStorage.getItem('admin_data_draft');
  if(saved){
    if(confirm('Tienes cambios sin guardar de una sesión anterior. ¿Cargarlos?')){
      try{DATA = JSON.parse(saved);}catch(e){}
    }else{
      localStorage.removeItem('admin_data_draft');
    }
  }
  bindNav();
  bindActions();
  render();
}

function bindNav(){
  document.querySelectorAll('.sb-link').forEach(b=>{
    b.addEventListener('click',()=>{
      document.querySelectorAll('.sb-link').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      currentTab = b.dataset.tab;
      document.getElementById('pageTitle').textContent = TAB_TITLES[currentTab];
      document.querySelector('.sidebar').classList.remove('open');
      render();
    });
  });
  document.getElementById('mobileMenuBtn').onclick = ()=>document.querySelector('.sidebar').classList.toggle('open');
}

function bindActions(){
  document.getElementById('saveBtn').onclick = ()=>{
    localStorage.setItem('admin_data_draft', JSON.stringify(DATA));
    toast('Cambios guardados localmente. Recuerda descargar el JSON para subirlo a GitHub.', 'success');
  };
  document.getElementById('downloadBtn').onclick = downloadJSON;
  document.getElementById('loadJsonBtn').onclick = ()=>document.getElementById('loadJsonInput').click();
  document.getElementById('loadJsonInput').onchange = (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev)=>{
      try{
        DATA = JSON.parse(ev.target.result);
        toast('JSON cargado correctamente','success');
        render();
      }catch(err){toast('Archivo JSON inválido','error');}
    };
    reader.readAsText(file);
  };
}

function downloadJSON(){
  const blob = new Blob([JSON.stringify(DATA,null,2)],{type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url;a.download='data.json';a.click();
  URL.revokeObjectURL(url);
  toast('¡data.json descargado! Súbelo a GitHub junto al index.html','success');
}

function toast(msg,type=''){
  const t = document.getElementById('toast');
  t.className = 'toast show ' + type;
  t.innerHTML = `<i class="fas fa-${type==='success'?'check-circle':type==='error'?'exclamation-circle':'info-circle'}"></i>${msg}`;
  clearTimeout(t._tm);
  t._tm = setTimeout(()=>{t.className='toast';},3500);
}

// ============================================
// RENDER FORMS
// ============================================
function render(){
  const c = document.getElementById('content');
  c.innerHTML = '';
  const r = RENDERERS[currentTab];
  if(r) r(c);
}

const RENDERERS = {
  site:renderSite,theme:renderTheme,menu:renderMenu,player:renderPlayer,
  banners:renderBanners,news:renderNews,featuredNews:renderFeaturedNews,
  topPrograms:renderTopPrograms,schedule:renderSchedule,podcasts:renderPodcasts,
  videos:renderVideos,locutores:renderLocutores,vote:renderVote,footer:renderFooter,json:renderJSON
};

// Helper: text field
function field(label,value,onchange,type='text',placeholder=''){
  const id = 'f_'+Math.random().toString(36).slice(2,9);
  return `<div class="form-group"><label class="form-label" for="${id}">${label}</label><input id="${id}" type="${type}" class="form-input" value="${(value||'').toString().replace(/"/g,'&quot;')}" placeholder="${placeholder}" data-on="${onchange}" /></div>`;
}
function fieldFull(label,value,onchange,type='text'){
  return `<div class="form-group full"><label class="form-label">${label}</label><input type="${type}" class="form-input" value="${(value||'').toString().replace(/"/g,'&quot;')}" data-on="${onchange}" /></div>`;
}
function textareaFull(label,value,onchange){
  return `<div class="form-group full"><label class="form-label">${label}</label><textarea class="form-textarea" data-on="${onchange}">${value||''}</textarea></div>`;
}
function colorField(label,value,onchange){
  return `<div class="form-group"><label class="form-label">${label}</label><div class="color-row"><input type="color" value="${value||'#e91e63'}" data-on="${onchange}_color" /><input type="text" class="form-input" value="${value||''}" data-on="${onchange}" /></div></div>`;
}

// Bind inputs via delegation
document.addEventListener('input',e=>{
  const t = e.target;
  if(!t.dataset.on) return;
  const fn = HANDLERS[t.dataset.on];
  if(fn) fn(t.value, t);
});

const HANDLERS = {};

// ============== SITE ==============
function renderSite(c){
  const s = DATA.site;
  c.innerHTML = `
    <div class="info-box"><i class="fas fa-info-circle"></i><div>Configura la información general de tu sitio web. Todos los cambios se reflejan en el header, footer y reproductor.</div></div>
    <div class="card">
      <div class="card-title"><i class="fas fa-globe"></i>Datos Generales</div>
      <div class="form-grid">
        ${field('Nombre del sitio',s.name,'site_name')}
        ${field('Tagline / Eslogan',s.tagline,'site_tagline')}
        ${fieldFull('URL del stream de audio',s.streamUrl,'site_stream')}
        ${fieldFull('URL App (Google Play)',s.appUrl,'site_app')}
      </div>
    </div>
    <div class="card">
      <div class="card-title"><i class="fas fa-share-alt"></i>Redes Sociales</div>
      <div class="form-grid">
        ${field('Facebook',s.social.facebook,'soc_fb')}
        ${field('Instagram',s.social.instagram,'soc_ig')}
        ${field('YouTube',s.social.youtube,'soc_yt')}
        ${field('TikTok',s.social.tiktok,'soc_tt')}
        ${field('WhatsApp (wa.me/...)',s.social.whatsapp,'soc_wa')}
      </div>
    </div>`;
}
HANDLERS.site_name=v=>DATA.site.name=v;
HANDLERS.site_tagline=v=>DATA.site.tagline=v;
HANDLERS.site_stream=v=>DATA.site.streamUrl=v;
HANDLERS.site_app=v=>DATA.site.appUrl=v;
HANDLERS.soc_fb=v=>DATA.site.social.facebook=v;
HANDLERS.soc_ig=v=>DATA.site.social.instagram=v;
HANDLERS.soc_yt=v=>DATA.site.social.youtube=v;
HANDLERS.soc_tt=v=>DATA.site.social.tiktok=v;
HANDLERS.soc_wa=v=>DATA.site.social.whatsapp=v;

// ============== THEME ==============
function renderTheme(c){
  const t = DATA.theme;
  c.innerHTML = `
    <div class="info-box"><i class="fas fa-palette"></i><div>Personaliza los colores de tu sitio. Los cambios solo se aplican al descargar y subir el data.json al GitHub.</div></div>
    <div class="card">
      <div class="card-title"><i class="fas fa-palette"></i>Colores Principales</div>
      <div class="form-grid">
        ${colorField('Color Primario (Rosa)',t.primary,'th_primary')}
        ${colorField('Primario Oscuro',t.primaryDark,'th_primaryDark')}
        ${colorField('Primario Claro',t.primaryLight,'th_primaryLight')}
        ${colorField('Acento',t.accent,'th_accent')}
        ${colorField('Fondo (Background)',t.background,'th_background')}
        ${colorField('Superficie (Surface)',t.surface,'th_surface')}
        ${colorField('Color de Texto',t.text,'th_text')}
        ${colorField('Texto Suave',t.textMuted,'th_textMuted')}
      </div>
    </div>
    <div class="card">
      <div class="card-title"><i class="fas fa-eye"></i>Vista Previa</div>
      <div style="display:flex;gap:14px;flex-wrap:wrap">
        <div style="background:${t.primary};color:#fff;padding:14px 24px;border-radius:10px;font-weight:700">Primario</div>
        <div style="background:${t.primaryDark};color:#fff;padding:14px 24px;border-radius:10px;font-weight:700">Primario Oscuro</div>
        <div style="background:${t.accent};color:#fff;padding:14px 24px;border-radius:10px;font-weight:700">Acento</div>
        <div style="background:${t.primaryLight};color:${t.primaryDark};padding:14px 24px;border-radius:10px;font-weight:700">Primario Claro</div>
        <div style="background:${t.background};color:${t.text};padding:14px 24px;border-radius:10px;font-weight:700;border:1px solid #eee">Fondo</div>
      </div>
    </div>`;
}
['primary','primaryDark','primaryLight','accent','background','surface','text','textMuted'].forEach(k=>{
  HANDLERS['th_'+k]=v=>{DATA.theme[k]=v;};
  HANDLERS['th_'+k+'_color']=(v,el)=>{
    DATA.theme[k]=v;
    // sync text input
    const text = el.parentElement.querySelector('input[type="text"]');
    if(text) text.value = v;
    // refresh preview only if visible
    const previewCards = el.closest('.card')?.parentElement?.querySelectorAll('.card')[1];
  };
});

// ============== MENU ==============
function renderMenu(c){
  c.innerHTML = `
    <div class="info-box"><i class="fas fa-info-circle"></i><div>Agrega, elimina o reordena los enlaces del menú de navegación.</div></div>
    <div class="card"><div class="card-title"><i class="fas fa-bars"></i>Items del Menú</div>
    <div class="items-list" id="menuList"></div>
    <button class="add-btn" onclick="addMenuItem()" style="margin-top:14px"><i class="fas fa-plus"></i> Agregar item al menú</button></div>`;
  renderMenuList();
}
function renderMenuList(){
  const list = document.getElementById('menuList');
  list.innerHTML = (DATA.menu||[]).map((m,i)=>`
    <div class="item-card">
      <div class="item-header">

// ============== GENERIC LIST RENDERER ==============
function renderList(arrKey, fields, options={}){
  const arr = DATA[arrKey]||[];
  const c = document.getElementById('content');
  const title = options.title||arrKey;
  const icon = options.icon||'list';
  const itemLabel = options.itemLabel||'Item';
  const defaults = options.defaults||{};
  c.innerHTML = `
    <div class="info-box"><i class="fas fa-info-circle"></i><div>${options.help||'Administra los elementos de esta sección.'}</div></div>
    <div class="card"><div class="card-title"><i class="fas fa-${icon}"></i>${title}</div>
    <div class="items-list" id="genList"></div>
    <button class="add-btn" id="addBtn" style="margin-top:14px"><i class="fas fa-plus"></i> Agregar ${itemLabel.toLowerCase()}</button></div>`;
  const list = document.getElementById('genList');
  function refresh(){
    list.innerHTML = arr.map((item,i)=>`
      <div class="item-card">
        <div class="item-header">
          <div class="item-title"><span class="item-num">${i+1}</span> ${itemLabel}${item[fields[0].key]?': '+escapeHtml(String(item[fields[0].key]).slice(0,40)):''}</div>
          <div class="item-actions">
            ${i>0?`<button class="icon-btn" data-mv="${i}" data-d="-1"><i class="fas fa-arrow-up"></i></button>`:''}
            ${i<arr.length-1?`<button class="icon-btn" data-mv="${i}" data-d="1"><i class="fas fa-arrow-down"></i></button>`:''}
            <button class="icon-btn delete" data-del="${i}"><i class="fas fa-trash"></i></button>
          </div>
        </div>
        <div class="form-grid">
          ${fields.map(f=>{
            const v = item[f.key]||'';
            const cls = f.full?'form-group full':'form-group';
            if(f.type==='textarea') return `<div class="${cls}"><label class="form-label">${f.label}</label><textarea class="form-textarea" data-i="${i}" data-k="${f.key}">${escapeHtml(v)}</textarea></div>`;
            return `<div class="${cls}"><label class="form-label">${f.label}</label><input type="${f.type||'text'}" class="form-input" value="${escapeHtml(String(v))}" data-i="${i}" data-k="${f.key}" /></div>`;
          }).join('')}
        </div>
        ${item.image?`<div class="preview-row" style="margin-top:10px"><img class="img-preview" src="${item.image}" onerror="this.style.opacity=.3" /></div>`:''}
      </div>`).join('');
    list.querySelectorAll('input,textarea').forEach(el=>{
      el.addEventListener('input',()=>{
        const i = +el.dataset.i, k = el.dataset.k;
        let val = el.value;
        if(el.type==='number') val = +val||0;
        arr[i][k] = val;
      });
    });
    list.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',()=>{
      if(confirm('¿Eliminar este elemento?')){arr.splice(+b.dataset.del,1);refresh();}
    }));
    list.querySelectorAll('[data-mv]').forEach(b=>b.addEventListener('click',()=>{
      const i=+b.dataset.mv,d=+b.dataset.d;[arr[i],arr[i+d]]=[arr[i+d],arr[i]];refresh();
    }));
  }
  document.getElementById('addBtn').onclick = ()=>{arr.push({...defaults});refresh();};
  refresh();
}
function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ============== SCHEDULE ==============
function renderSchedule(c){
  c.innerHTML = `
    <div class="info-box"><i class="fas fa-info-circle"></i><div>Configura la programación radial por día. Selecciona un día y agrega/edita los programas.</div></div>
    <div class="card">
      <div class="card-title"><i class="fas fa-calendar-week"></i>Programación por Día</div>
      <div class="day-tabs" id="dayTabsAdmin">
        ${DAY_KEYS.map(d=>`<button class="day-tab-admin ${d===currentDay?'active':''}" data-d="${d}">${DAY_LABELS[d]}</button>`).join('')}
      </div>
      <div class="items-list" id="schedList"></div>
      <button class="add-btn" id="addSched" style="margin-top:14px"><i class="fas fa-plus"></i> Agregar programa</button>
    </div>`;
  document.querySelectorAll('.day-tab-admin').forEach(b=>b.addEventListener('click',()=>{
    currentDay = b.dataset.d;
    document.querySelectorAll('.day-tab-admin').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    refreshSched();
  }));
  document.getElementById('addSched').onclick = ()=>{
    if(!DATA.schedule[currentDay]) DATA.schedule[currentDay]=[];
    DATA.schedule[currentDay].push({name:'',time:'',image:''});
    refreshSched();
  };
  refreshSched();
}
function refreshSched(){
  if(!DATA.schedule) DATA.schedule={};
  if(!DATA.schedule[currentDay]) DATA.schedule[currentDay]=[];
  const arr = DATA.schedule[currentDay];
  const list = document.getElementById('schedList');
  if(!arr.length){list.innerHTML='<div style="text-align:center;padding:30px;color:var(--text-muted)">No hay programas para este día. Agrega uno.</div>';return;}
  list.innerHTML = arr.map((p,i)=>`
    <div class="item-card">
      <div class="item-header">
        <div class="item-title"><span class="item-num">${i+1}</span> ${p.name||'Programa'}</div>
        <div class="item-actions">
          ${i>0?`<button class="icon-btn" data-mv="${i}" data-d="-1"><i class="fas fa-arrow-up"></i></button>`:''}
          ${i<arr.length-1?`<button class="icon-btn" data-mv="${i}" data-d="1"><i class="fas fa-arrow-down"></i></button>`:''}
          <button class="icon-btn delete" data-del="${i}"><i class="fas fa-trash"></i></button>
        </div>
      </div>
      <div class="form-grid">
        <div class="form-group full"><label class="form-label">Nombre</label><input class="form-input" value="${escapeHtml(p.name||'')}" data-i="${i}" data-k="name" /></div>
        <div class="form-group"><label class="form-label">Horario (ej: 09:00 - 12:00)</label><input class="form-input" value="${escapeHtml(p.time||'')}" data-i="${i}" data-k="time" /></div>
        <div class="form-group"><label class="form-label">URL imagen</label><input class="form-input" value="${escapeHtml(p.image||'')}" data-i="${i}" data-k="image" /></div>
      </div>
    </div>`).join('');
  list.querySelectorAll('input').forEach(el=>el.addEventListener('input',()=>{
    arr[+el.dataset.i][el.dataset.k]=el.value;
  }));
  list.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',()=>{
    if(confirm('¿Eliminar?')){arr.splice(+b.dataset.del,1);refreshSched();}
  }));
  list.querySelectorAll('[data-mv]').forEach(b=>b.addEventListener('click',()=>{
    const i=+b.dataset.mv,d=+b.dataset.d;[arr[i],arr[i+d]]=[arr[i+d],arr[i]];refreshSched();
  }));
}
